<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Tile background: near-black with a cool blue cast, brighter at top -->
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A1730"/>
      <stop offset="0.45" stop-color="#0E0C1A"/>
      <stop offset="1" stop-color="#070610"/>
    </linearGradient>

    <!-- Brand gradient: violet -> fuchsia -> pink, 135deg -->
    <linearGradient id="brand" x1="300" y1="280" x2="724" y2="744" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>

    <!-- Soft top-left glow behind the mark -->
    <radialGradient id="glow" cx="0.36" cy="0.30" r="0.75" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#7C3AED" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>

    <!-- Top glassy highlight -->
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="markGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="26" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#tile)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#glow)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#sheen)"/>

  <!-- Soft drop shadow under the mark for depth -->
  <path d="M 304 752 L 304 300 L 512 540 L 720 300 L 720 752"
        fill="none" stroke="#000000" stroke-opacity="0.45"
        stroke-width="132" stroke-linejoin="round" stroke-linecap="round"
        transform="translate(0,16)" filter="url(#markGlow)" opacity="0.35"/>

  <!-- The geometric M monogram -->
  <path d="M 304 752 L 304 300 L 512 540 L 720 300 L 720 752"
        fill="none" stroke="url(#brand)"
        stroke-width="132" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Inner light edge on the mark (premium bevel) -->
  <path d="M 304 752 L 304 300 L 512 540 L 720 300 L 720 752"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.22"
        stroke-width="10" stroke-linejoin="round" stroke-linecap="round"
        transform="translate(0,-4)"/>

  <!-- Subtle tile border -->
  <rect x="1" y="1" width="1022" height="1022" rx="223"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2"/>
</svg>
